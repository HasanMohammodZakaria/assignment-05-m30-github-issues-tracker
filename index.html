<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--daisy & tailwind cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>

    <section class="login-section min-h-screen flex justify-center items-center">
        <fieldset id="login-page"
            class="fieldset bg-white border-base-300 rounded-box p-8 drop-shadow-2xl w-full max-w-[520px] mx-auto flex flex-col justify-center">

            <!-- login content -->
            <div class="flex flex-col justify-center items-center mb-6">
                <img src="./assets/github-logo.png" alt="" class="mb-6">
                <h3 class="text-2xl font-semibold text-[#1F2937]">
                    GitHub Issues Tracker
                </h3>
                <p class="text-[#64748B]">
                    Sign in to manage your issues
                </p>
            </div>

            <!-- login form -->
            <form>
                <label class="label text-left font-medium text-[#1F2937] mb-2">Username</label>
                <input id="user-name" type="text" class="input w-full text-[#64748B] mb-2" placeholder="Enter Username" />
                <p class="text-[14px] text-[#4A00FF] mb-4">Default: admin</p>

                <label class="label text-left font-medium text-[#1F2937] mb-2">Password</label>
                <input id="password" type="password" class="input w-full text-[#64748B] mb-2" placeholder="Password" />
                <p class="text-[14px] text-[#4A00FF] ">Default: admin123</p>

                <button id="login-btn" class="btn bg-[#4A00FF] mt-4 w-full text-white font-semibold">Sign In</button>
            </form>

            <!-- separator  -->
            <div class="flex items-center gap-2 my-6">
                <div class="flex-1 h-px bg-[#E4E4E7]"></div>
                <span class="px-1 text-[#1F2937]">OR</span>
                <div class="flex-1 h-px bg-[#E4E4E7]"></div>
            </div>

            <!-- extra info -->
            <div class="flex flex-col items-center">
                <p class="text-[14px] text-[#64748B] mb-2">Demo Credentials:</p>
                <div class="bg-[#F8FAFC] w-full text-center rounded-lg p-6">
                    <p class="text-[#1F2937] font-semibold">Username: <span class="font-light text-[#]">admin</span></p>
                    <p class="text-[#1F2937] font-semibold">Password: <span class="font-light text-[#]">admin123</span></p>
                </div>
            </div>
            
        </fieldset>

        

    </section>

    <!-- js link -->
    <script src="./script/login.js"></script>
    
</body>

</html>
