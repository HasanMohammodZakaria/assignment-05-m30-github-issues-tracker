<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--daisy & tailwind cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/> -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>

    <header class="">
        <div class="navbar bg-base-100 shadow-sm w-full">
            <div class="w-11/12 mx-auto flex flex-col md:flex-row justify-between">
                <div class="flex-1 flex flex-col items-center gap-1 mb-4 md:mb-0 md:flex-row md:items-center md:gap-2 ">
                    <img src="./assets/github-logo.png" alt="" class="w-10">
                    <h2 class="text-6 font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
                <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                    <div class="relative flex-1 w-full md:w-auto max-w-sm">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="fa-solid fa-magnifying-glass text-[#64748B]"></i>
                        </span>
                        <input type="text" placeholder="Search issues..." class="input input-bordered w-full pl-10 text-[#64748B]" />
                    </div>
                    
                    <button class="btn btn-primary flex items-center gap-2 w-full sm:w-auto justify-center">
                        <i class="fa-solid fa-plus"></i> New Issue
                    </button>
                        
                    
                </div>
            </div>
        </div>
    </header>







    <!-- js link -->
    <script src="./script/login.js"></script>
    <script src="./script/app.js"></script>
</body>

</html>
