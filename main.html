<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--daisy & tailwind cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/> -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <!-- HEADER DESIGN -->
    <header class="">
        <div class="navbar bg-base-100 shadow-sm w-full">
            <div class="w-11/12 mx-auto flex flex-col md:flex-row justify-between">
                <div class="flex-1 flex flex-col items-center gap-1 mb-4 md:mb-0 md:flex-row md:items-center md:gap-2 ">
                    <img src="./assets/github-logo.png" alt="" class="w-10">
                    <h2 class="text-6 font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
                <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                    <div class="relative flex-1 w-full md:w-auto max-w-sm">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="fa-solid fa-magnifying-glass text-[#64748B]"></i>
                        </span>
                        <input type="text" placeholder="Search issues..."
                            class="input input-bordered w-full pl-10 text-[#64748B]" />
                    </div>

                    <button class="btn btn-primary flex items-center gap-2 w-full sm:w-auto justify-center">
                        <i class="fa-solid fa-plus"></i> New Issue
                    </button>


                </div>
            </div>
        </div>
    </header>

    <main class="py-16">
        <!-- BTN TRACKER SECTION -->
        <section class="">
            <div
                class="btn-container w-full sm:w-11/12 lg:w-10/12 mx-auto bg-white p-6 drop-shadow-sm rounded-lg flex gap-3 flex-wrap">

                <button id="all-issues-tracker-btn" class="btn btn-primary w-[120px]">
                    All
                </button>

                <button id="open-issues-tracker-btn" class="btn btn-outline w-[120px]">
                    Open
                </button>

                <button id="closed-issues-tracker-btn" class="btn btn-outline w-[120px]">
                    Closed
                </button>

            </div>

        </section>

        <!-- UPDATE ISSUES TRACKER SECTION -->
        <section>
            <div
                class="w-full sm:w-11/12 lg:w-10/12 mx-auto flex flex-col md:flex-row md:justify-between md:items-center bg-white drop-shadow-sm rounded-t-lg mt-4 px-6 py-4 gap-4">

                <div class="rigth-side card card-side flex justify-center items-center ">
                    <div class="w-[50px] h-[50px] bg-[#ECE4FF] flex justify-center items-center rounded-full">
                        <img src="./assets/Aperture.png" alt="" class="w-[30px] h-[30px]" />
                    </div>
                    <div class="card-body flex fles-col gap-1">
                        <h2 class="card-title text-xl font-semibold">50 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>

                <div class="left-side flex gap-4">
                    <button class="font-medium text-[#1F2937]">
                        <span class="text-[14px] text-[#00A96E]"><i class="fa-solid fa-circle"></i></span>
                        Open
                    </button>
                    <button class="font-medium text-[#1F2937]">
                        <span class="text-[14px] text-[#A855F7]"><i class="fa-solid fa-circle"></i></span>
                        Closed
                    </button>
                </div>

            </div>
        </section>

        <!-- ISSUES TRACKER CARD SECTION -->
        <section>
            <divJ
                class="card-teacker-container w-full sm:w-11/12 lg:w-10/12 mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-[#FBFBFB] p-5 drop-shadow-sm rounded-b-lg border-t border-gray-200">

                <div class="card-tracker bg-white drop-shadow-sm rounded-lg">

                    <div class="p-5 space-y-3">
                        <div class="flex justify-between">
                            <img src="./assets/Open-Status.png" alt="">
                            <img src="./assets/Closed- Status .png" alt="" class="hidden">
                            <div class="w-20 h-6 badge bg-[#FFF6D1] text-[#F59E0B] text-sm font-medium p-2">MEDIUM</div>
                        </div>
                        <h3 class="text-[14px] font-semibold text-[#1F2937]">Fix navigation menu on mobile devices</h3>
                        <p class="text-[12px] text-[#64748B]">The navigation menu doesn't collapse properly on mobile
                            devices...</p>
                        <div class="level-container">
                            <button
                                class="text-[#EF4444] text-[12px] font-medium bg-[#FEECEC] border border-[#FECACA] px-4 py-2 rounded-4xl">
                                <i class="fa-solid fa-bug"></i>
                                BUG
                            </button>
                            <button
                                class="text-[#D97706] text-[12px] font-medium bg-[#FFF8DB] border border-[#FDE68A] px-4 py-2 rounded-4xl">
                                <i class="fa-chisel fa-regular fa-life-ring"></i>
                                HELP WANTED
                            </button>
                        </div>
                    </div>


                    <hr class="w-full border-gray-100 ">
                    
                    <div class="p-5">
                        <p class="text-[12px] text-[#64748B]">#1by john_doe</p>
                        <p class="text-[12px] text-[#64748B]">1/15/2024</p>
                    </div>
                </div>
            </div>
        </section>
    </main>







    <!-- js link -->
    <script src="./script/app.js"></script>
</body>

</html>
