                    <img src="./assets/github-logo.png" alt="" class="w-10">
                    <h2 class="text-6 font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
                <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">

                    <label class="input">

                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"

                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="input-search" type="search" required placeholder="Search" />
                    </label>

                    <button id="btn-search" class="btn btn-primary flex items-center gap-2 w-full sm:w-auto justify-center">
                        <i class="fa-solid fa-plus"></i> New Issue
                    </button>


                </div>
            </div>
        </div>

        <!-- BTN TRACKER SECTION -->
        <section class="">
            <div id="all-btn-container"
                class="all-btn-container w-full sm:w-11/12 lg:w-10/12 mx-auto bg-white p-6 drop-shadow-sm rounded-lg flex gap-3 flex-wrap">

                <button data-status='all' id="all-issues-tracker-btn" class="btn bg-[#4A00FF] text-white w-[120px]">
                    All
                </button>

                <button data-status='open' id="open-issues-tracker-btn" class="btn bg-white text-black w-[120px]">
                    Open
                </button>

                <button data-status='closed' id="closed-issues-tracker-btn" class="btn  bg-white text-black w-[120px]">
                    Closed
                </button>

            </div>

        </section>

        <!-- UPDATE ISSUES TRACKER SECTION -->
        <section>
            <div
                class="w-full sm:w-11/12 lg:w-10/12 mx-auto flex flex-col md:flex-row md:justify-between md:items-center bg-white drop-shadow-sm rounded-t-lg mt-4 px-6 py-4 gap-4">

                <div class="rigth-side card card-side flex justify-center items-center ">
                    <div class="w-[50px] h-[50px] bg-[#ECE4FF] flex justify-center items-center rounded-full">
                        <img src="./assets/Aperture.png" alt="" class="w-[30px] h-[30px]" />
                    </div>
                    <div class="card-body flex fles-col gap-1">
                        <h2 id="total-issue-count" class="card-title text-xl font-semibold">
                            <span>0 Issues</span>
                        </h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>

                <div class="left-side flex gap-4">
                    <button class="font-medium text-[#1F2937]">
                        <span class="text-[14px] text-[#00A96E]"><i class="fa-solid fa-circle"></i></span>
                        Open
                    </button>
                    <button class="font-medium text-[#1F2937]">
                        <span class="text-[14px] text-[#A855F7]"><i class="fa-solid fa-circle"></i></span>
                        Closed
                    </button>
                </div>

            </div>
        </section>

        <!-- spinner section -->
        <section id="spinner"
            class="spinner-section w-full sm:w-11/12 lg:w-10/12 mx-auto justify-center items-center p-5 hidden">
            <span class="loading loading-bars loading-xl"></span>
